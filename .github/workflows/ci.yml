name: CI

# Unless we are on the main branch, the workflow should stop and yield to a new run if new code is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'main')}}

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format, Clippy & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          components: clippy,rustfmt

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Check code formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features

  wasm-check:
    name: WASM walletkit-db compile check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          targets: wasm32-unknown-unknown

      - name: Select wasm-capable clang
        shell: bash
        run: |
          set -euo pipefail

          CLANG_VERSION="$(clang --version | head -n1 || true)"
          CLANG_MAJOR="$(echo "$CLANG_VERSION" | sed -nE 's/.*clang version ([0-9]+).*/\1/p')"

          if [ -n "$CLANG_MAJOR" ] && [ "$CLANG_MAJOR" -ge 15 ]; then
            echo "Using system clang: $CLANG_VERSION"
            CC_BIN="clang"
          else
            echo "System clang is missing/too old for sqlite-wasm-rs; installing clang-18"
            sudo apt-get update
            sudo apt-get install -y clang-18 llvm-18
            CC_BIN="clang-18"
            CLANG_MAJOR="18"
          fi

          AR_BIN=""
          if command -v llvm-ar >/dev/null 2>&1; then
            AR_BIN="llvm-ar"
          elif [ -n "$CLANG_MAJOR" ] && command -v "llvm-ar-${CLANG_MAJOR}" >/dev/null 2>&1; then
            AR_BIN="llvm-ar-${CLANG_MAJOR}"
          elif command -v llvm-ar-18 >/dev/null 2>&1; then
            AR_BIN="llvm-ar-18"
          elif command -v ar >/dev/null 2>&1; then
            AR_BIN="ar"
          else
            echo "No suitable archiver found for wasm build" >&2
            exit 1
          fi

          echo "Using CC: $CC_BIN"
          echo "Using AR: $AR_BIN"
          echo "CC_wasm32_unknown_unknown=$CC_BIN" >> "$GITHUB_ENV"
          echo "AR_wasm32_unknown_unknown=$AR_BIN" >> "$GITHUB_ENV"

      - name: Run WASM compile check
        run: cargo check -p walletkit-db --target wasm32-unknown-unknown

  swift-build-and-test:
    name: Swift Build & Foreign Binding Tests
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          targets: aarch64-apple-ios-sim,aarch64-apple-ios,x86_64-apple-ios

      # Ensure a specific Xcode version is selected to match available simulators
      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      # Includes temporary downstream UniFFI callback vtable patch:
      # https://github.com/mozilla/uniffi-rs/pull/2821
      - name: Run Swift foreign binding tests (with temporary UniFFI ASan workaround)
        run: ./swift/test_swift.sh

      - name: Install SwiftLint
        run: |
          brew install swiftlint

      - name: Lint Swift Tests
        run: swiftlint swift/tests

  kotlin-build-and-test:
    name: Kotlin Build & Foreign Binding Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0

      - name: Build and test Kotlin bindings
        run: ./kotlin/test_kotlin.sh

      - name: Install ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/latest/download/ktlint &&
          chmod a+x ktlint &&
          sudo mv ktlint /usr/local/bin/

      - name: Lint Kotlin Tests
        run: |
          ktlint kotlin/walletkit-tests/src/test/kotlin

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        rust:
          - stable
          - nightly
          - 1.92.0 # MSRV

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run tests
        env:
          WORLDCHAIN_SEPOLIA_RPC_URL: ${{ secrets.WORLDCHAIN_SEPOLIA_RPC_URL || 'https://worldchain-sepolia.g.alchemy.com/public' }}
          WORLDCHAIN_RPC_URL: ${{ secrets.WORLDCHAIN_RPC_URL || 'https://worldchain-mainnet.g.alchemy.com/public' }}
        # we don't do --all-features because `compress-zkeys` is very expensive for the CI and doesn't need to be tested on every PR
        # we add the remainder of non-default features to include them in tests
        run: |
          cargo test --workspace --features walletkit-core/legacy-nullifiers

      - name: Build non-default features
        run: |
          cargo build --all --no-default-features

  deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources

    continue-on-error: ${{ matrix.checks == 'advisories' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
          rust-version: 1.92.0

  docs:
    name: Check docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: dtolnay/install@cargo-docs-rs
      - run: |
          cargo +nightly docs-rs -p walletkit-core
          cargo +nightly docs-rs -p walletkit
