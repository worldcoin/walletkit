  prepare-kotlin:
    name: Prepare Kotlin
    runs-on: arc-public-8xlarge-amd64-runner
    # needs: [pre-release-checks]
    env:
      CARGO_HOME: /home/runner/_work/_cargo
      RUSTUP_HOME: /home/runner/_work/_rustup
    # permissions:
    #   contents: write # to upload artifacts

    # Each target is built separately to run in parallel. Running sequentially takes vastly more time.
    strategy:
      fail-fast: true
      matrix:
        settings:
          - target: aarch64-linux-android
          - target: armv7-linux-androideabi
          - target: x86_64-linux-android
          - target: i686-linux-android

    steps:
      - name: Add Cargo to PATH
        run: echo "$CARGO_HOME/bin" >> $GITHUB_PATH

      - name: Checkout code
        uses: actions/checkout@v6
        # with:
        #   ref: ${{ needs.pre-release-checks.outputs.commit_sha }} # to ensure all builds are consistent

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.settings.target }}
          components: rustfmt

      - name: Set up Noir for ProveKit
        uses: noir-lang/noirup@7dbe69ccc78877f0200ffa5a40836c953d2cfd8f # v0.1.4
        env:
          NARGO_HOME: ${{ env.CARGO_HOME }}
        with:
          # See https://github.com/worldfnd/provekit, a specific nargo toolchain version is required
          toolchain: v1.0.0-beta.11

      - name: Install Cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build for target
        run: |
          CROSS_NO_WARNINGS=0 cross build -p walletkit --target ${{ matrix.settings.target }} --release --locked --features compress-zkeys,v3

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.settings.target }}
          path: ./target/${{ matrix.settings.target }}/release/libwalletkit.so
          if-no-files-found: error

