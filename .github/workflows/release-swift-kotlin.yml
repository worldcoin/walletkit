name: Test Native FFI Builds (Nix)

# Temporary branch-only workflow for validating the Nix release build flow.
# Revert this change after the test run; it deliberately performs no publishing.
on:
  push:
    branches:
      - nix/android-devshell

env:
  WALLETKIT_CARGO_FEATURES: compress-zkeys,embed-zkeys,v3

permissions:
  contents: read

jobs:
  build-swift:
    name: Build Swift native libraries
    runs-on: macos-26
    env:
      WALLETKIT_DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    permissions:
      contents: read
      actions: write # to save Rust cache

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      # TODO: magic-nix-cache relies on a reverse-engineered GitHub cache API and may
      # break without notice (its free tier was already EOL'd once in Feb 2025).
      # If it dies, builds still work, just slower. Consider migrating to
      # nix-community/cache-nix-action or a real Cachix/FlakeHub cache.
      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Cache Rust build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release
            target/aarch64-apple-ios
            target/aarch64-apple-ios-sim
            target/x86_64-apple-ios
          key: ${{ runner.os }}-cargo-swift-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'flake.lock', 'flake.nix', 'nix/**/*.nix', 'swift/build_swift.sh') }}
          restore-keys: |
            ${{ runner.os }}-cargo-swift-

      - name: Verify Xcode SDKs from Nix shell
        run: |
          nix develop .#swift --command bash -lc '
            xcodebuild -version
            # Keep in sync with the WALLETKIT_DEVELOPER_DIR pin above.
            xcodebuild -version | grep -q "^Xcode 26.5" || {
              echo "error: unexpected Xcode version, expected 26.5" >&2
              exit 1
            }
            xcrun --show-sdk-path --sdk iphoneos
            xcrun --show-sdk-path --sdk iphonesimulator
          '

      # Includes temporary downstream UniFFI callback vtable patch:
      # https://github.com/mozilla/uniffi-rs/pull/2821
      - name: Build the project (iOS, with temporary UniFFI ASan workaround)
        run: nix develop .#swift --command ./swift/build_swift.sh

  build-android:
    name: Build Android native library (${{ matrix.target }})
    runs-on: arc-public-8xlarge-amd64-runner
    permissions:
      contents: read
      actions: write # to save Rust cache

    strategy:
      fail-fast: true
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - x86_64-linux-android
          - i686-linux-android

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      # TODO: see note on magic-nix-cache fragility in the build-swift job.
      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Cache Rust build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release
            target/${{ matrix.target }}
          key: ${{ runner.os }}-cargo-android-${{ matrix.target }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'flake.lock', 'flake.nix', 'nix/**/*.nix') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-${{ matrix.target }}-
            ${{ runner.os }}-cargo-android-

      - name: Build for target
        run: ./nix/build-android.sh --target ${{ matrix.target }}
