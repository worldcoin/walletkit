name: Release FFI Bindings (Swift & Kotlin)

on:
  release:
    types: [published]

env:
  # The feature flags with which the Android library is built.
  # For iOS, this is set in the `build_swift.sh` file.
  WALLETKIT_CARGO_FEATURES: compress-zkeys,embed-zkeys,v3

jobs:
  pre-release-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      commit_sha: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get new version
        id: version
        run: |
          NEW_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.workspace_members[0]' | cut -d '#' -f2)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

  build-swift:
    # Swift depends on the host macOS/Xcode configuration and intentionally does
    # not run inside Nix.
    runs-on: macos-latest
    needs: pre-release-checks
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.pre-release-checks.outputs.commit_sha }} # to ensure all builds are consistent

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          targets: aarch64-apple-ios-sim,aarch64-apple-ios,x86_64-apple-ios
          components: rustfmt

      # Install nargo
      - uses: noir-lang/noirup@7dbe69ccc78877f0200ffa5a40836c953d2cfd8f # v0.1.4
        with:
          # See https://github.com/worldfnd/provekit, a specific nargo toolchain version is required
          toolchain: v1.0.0-beta.11

      # Includes temporary downstream UniFFI callback vtable patch:
      # https://github.com/mozilla/uniffi-rs/pull/2821
      - name: Build the project (iOS, with temporary UniFFI ASan workaround)
        run: ./swift/build_swift.sh

      - name: Compress XCFramework binary
        run: |
          zip -r WalletKit.xcframework.zip swift/WalletKit.xcframework

      - name: Checkout swift repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: worldcoin/walletkit-swift
          token: ${{ secrets.WALLETKIT_BOT_TOKEN }}
          path: target-repo

      - name: Create draft release in walletkit-swift & upload binaries
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        id: release
        with:
          repository: worldcoin/walletkit-swift
          name: ${{ needs.pre-release-checks.outputs.new_version }}
          tag_name: ${{ needs.pre-release-checks.outputs.new_version }}
          make_latest: false
          draft: true
          fail_on_unmatched_files: true
          files: WalletKit.xcframework.zip
          token: ${{ secrets.WALLETKIT_BOT_TOKEN }}

      - name: Get metadata
        id: meta
        run: |
          ASSET_URL="${{ fromJSON(steps.release.outputs.assets)[0].url }}.zip"
          echo "asset_url=${ASSET_URL}" >> $GITHUB_OUTPUT

          CHECKSUM=$(swift package compute-checksum WalletKit.xcframework.zip)
          echo "checksum=${CHECKSUM}" >> $GITHUB_OUTPUT

      - name: Commit swift build
        env:
          GITHUB_TOKEN: ${{ secrets.WALLETKIT_BOT_TOKEN }}
          ASSET_URL: ${{ steps.meta.outputs.asset_url }}
          CHECKSUM: ${{ steps.meta.outputs.checksum }}
          NEW_VERSION: ${{ needs.pre-release-checks.outputs.new_version }}

        run: |
          # Copy non-binary source files
          cp -r swift/Sources/ target-repo/Sources

          # Prepare Package.swift
          brew install swiftlint
          ./swift/archive_swift.sh --asset-url "$ASSET_URL" --checksum "$CHECKSUM" --release-version "$NEW_VERSION"
          cp Package.swift target-repo/

          # Commit changes
          cd target-repo
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Release $NEW_VERSION"

          # Tag the release
          git tag $NEW_VERSION
          git push
          git push origin $NEW_VERSION

      - name: Mark release as latest
        env:
          GH_TOKEN: ${{ secrets.WALLETKIT_BOT_TOKEN }}
        run: |
          gh release edit ${{ needs.pre-release-checks.outputs.new_version }} \
            --repo worldcoin/walletkit-swift \
            --draft=false \
            --latest

  prepare-kotlin:
    name: Prepare Kotlin
    runs-on: arc-public-8xlarge-amd64-runner
    needs: [pre-release-checks]
    permissions:
      contents: read
      actions: write # to save Rust cache

    # Each target is built separately to run in parallel. Running sequentially takes vastly more time.
    strategy:
      fail-fast: true
      matrix:
        settings:
          - target: aarch64-linux-android
          - target: armv7-linux-androideabi
          - target: x86_64-linux-android
          - target: i686-linux-android

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.pre-release-checks.outputs.commit_sha }} # to ensure all builds are consistent

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      # TODO: magic-nix-cache is best-effort; builds still work without it.
      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Cache Rust build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release
            target/${{ matrix.settings.target }}
          key: ${{ runner.os }}-cargo-android-${{ matrix.settings.target }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'flake.lock', 'flake.nix', 'nix/**/*.nix') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-${{ matrix.settings.target }}-
            ${{ runner.os }}-cargo-android-

      - name: Build for target
        run: ./nix/build-android.sh --target ${{ matrix.settings.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-${{ matrix.settings.target }}
          path: ./target/${{ matrix.settings.target }}/release/libwalletkit.so
          if-no-files-found: error

  publish-kotlin:
    name: Publish Kotlin
    runs-on: ubuntu-latest
    needs: [pre-release-checks, prepare-kotlin]
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.pre-release-checks.outputs.commit_sha }} # to ensure all builds are consistent

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      # TODO: magic-nix-cache is best-effort; builds still work without it.
      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Setup Java
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          distribution: temurin
          java-version: 17

      - name: Download Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Assemble jniLibs & generate bindings
        run: nix develop . --command cargo xtask kotlin build --artifacts-dir artifacts

      - name: Publish
        working-directory: kotlin
        run: ./gradlew walletkit:publish
        env:
          GITHUB_ACTOR: wld-walletkit-bot
          GITHUB_TOKEN: ${{ github.token }}
