name: Build Swift FFI Bindings (Nix)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-swift-xcframework:
    name: Build Swift XCFramework
    # Pinned image (not macos-latest): the XCFramework is built with the host Xcode,
    # which Nix cannot pin, so the image + DEVELOPER_DIR determine the toolchain.
    runs-on: macos-26
    env:
      # Pin the Xcode version. The nix swift shell exports this as DEVELOPER_DIR and
      # fails if it lacks the iOS platform SDKs. (Plain DEVELOPER_DIR would not survive
      # into the shell — nix's apple-sdk hook overwrites it.)
      WALLETKIT_DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    permissions:
      contents: read
      actions: write # needed for cache save
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      # TODO: magic-nix-cache relies on a reverse-engineered GitHub cache API and may
      # break without notice (its free tier was already EOL'd once in Feb 2025).
      # If it dies, builds still work, just slower. Consider migrating to
      # nix-community/cache-nix-action or a real Cachix/FlakeHub cache.
      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Cache Rust build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release
            target/aarch64-apple-ios
            target/aarch64-apple-ios-sim
            target/x86_64-apple-ios
          key: ${{ runner.os }}-cargo-swift-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'flake.lock', 'flake.nix', 'nix/**/*.nix', 'swift/build_swift.sh') }}
          restore-keys: |
            ${{ runner.os }}-cargo-swift-

      - name: Verify Xcode SDKs from Nix shell
        run: |
          nix develop .#swift --command bash -lc '
            xcodebuild -version
            # Keep in sync with the DEVELOPER_DIR pin above.
            xcodebuild -version | grep -q "^Xcode 26.5" || {
              echo "error: unexpected Xcode version, expected 26.5" >&2
              exit 1
            }
            xcrun --show-sdk-path --sdk iphoneos
            xcrun --show-sdk-path --sdk iphonesimulator
          '

      - name: Build Swift XCFramework
        run: nix develop .#swift --command ./swift/build_swift.sh

      - name: Compress XCFramework binary
        run: nix develop .#swift --command zip -r WalletKit.xcframework.zip swift/WalletKit.xcframework

      - name: Compute Swift package checksum
        run: nix develop .#swift --command swift package compute-checksum WalletKit.xcframework.zip

      - name: Upload Swift artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: walletkit-swift-xcframework
          path: |
            WalletKit.xcframework.zip
            swift/Sources/WalletKit
          if-no-files-found: error
