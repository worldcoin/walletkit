name: Build Kotlin FFI Bindings (Nix)

on:
  workflow_dispatch:

env:
  # Match the Android release build feature set.
  WALLETKIT_CARGO_FEATURES: compress-zkeys,embed-zkeys,v3

permissions:
  contents: read

jobs:
  build-android-libs:
    name: Build Android library (${{ matrix.target }})
    runs-on: arc-public-8xlarge-amd64-runner
    permissions:
      contents: read
      actions: write

    strategy:
      fail-fast: true
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - x86_64-linux-android
          - i686-linux-android

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      # TODO: magic-nix-cache relies on a reverse-engineered GitHub cache API and may
      # break without notice (its free tier was already EOL'd once in Feb 2025).
      # If it dies, builds still work, just slower. Consider migrating to
      # nix-community/cache-nix-action or a real Cachix/FlakeHub cache.
      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Cache Rust build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release
            target/${{ matrix.target }}
          key: ${{ runner.os }}-cargo-android-${{ matrix.target }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'flake.lock', 'flake.nix', 'nix/**/*.nix') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-${{ matrix.target }}-
            ${{ runner.os }}-cargo-android-

      - name: Build for target
        run: ./nix/build-android.sh --target ${{ matrix.target }}

      - name: Upload native library
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/libwalletkit.so
          if-no-files-found: error

  build-kotlin-aar:
    name: Build Kotlin AAR
    runs-on: ubuntu-latest
    needs: build-android-libs
    permissions:
      contents: read
      actions: write # to save Rust cache

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      # TODO: see note on magic-nix-cache fragility in the build-android-libs job.
      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Setup Java
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          distribution: temurin
          java-version: 17

      - name: Download native libraries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Assemble jniLibs & generate bindings
        run: nix develop . --command ./kotlin/build_kotlin.sh --artifacts-dir artifacts

      - name: Build Kotlin AAR
        working-directory: kotlin
        run: ./gradlew --no-daemon walletkit:assembleRelease

      - name: Upload Kotlin AAR
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: walletkit-kotlin-aar
          path: kotlin/walletkit/build/outputs/aar/*.aar
          if-no-files-found: error
