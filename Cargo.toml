[workspace]
members = [
  "uniffi-bindgen",
  "walletkit-core",
  "walletkit",
  "walletkit-db",
  "walletkit-cli",
]
resolver = "2"

[workspace.package]
version = "0.15.0"
license = "MIT"
edition = "2021"
authors = ["World Contributors"]
readme = "./README.md"
homepage = "https://docs.world.org" # TODO: Update to specific WalletKit page
rust-version = "1.91" # MSRV
repository = "https://github.com/worldcoin/walletkit"
exclude = [
  "tests/",
  "uniffi-bindgen/",
  "walletkit-cli/",
  "/audits",
  "/kotlin",
  "/swift",
]
keywords = ["ZKP", "WorldID", "World", "Identity", "Semaphore"]
categories = ["api-bindings", "cryptography::cryptocurrencies"]


[workspace.dependencies]
alloy-core = { version = "1", default-features = false, features = [
  "sol-types",
] }
alloy-primitives = { version = "1", default-features = false }
uniffi = { version = "0.31.0", features = ["tokio", "wasm-unstable-single-threaded"] }
world-id-core = { version = "0.9.0", default-features = false }

# internal
walletkit-core = { version = "0.15.0", path = "walletkit-core", default-features = false }
walletkit-db = { version = "0.15.0", path = "walletkit-db" }

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }

[workspace.lints.rust]
missing_docs = "deny"
dead_code = "deny"

[profile.release]
opt-level = 'z' # Optimize for size.
lto = true      # Enable Link Time Optimization.
panic = "abort"
debug = false

# ── Vendored patches ─────────────────────────────────────────────────────────
#
# world-id-authenticator v0.5.2 ships with `default = ["embed-zkeys"]`, which
# propagates `world-id-proof/embed-zkeys` into the dependency graph even when
# that feature is not explicitly requested.  `world-id-proof/embed-zkeys`
# triggers a build-script network download of circuit files (~100 MB from
# raw.githubusercontent.com), making the `cargo check --target
# wasm32-unknown-unknown` CI step unreliable whenever that host cannot reach
# GitHub's raw content CDN.
#
# This patch vendors the crate with `default = []` so that embed-zkeys is only
# activated when our own `embed-zkeys` feature is explicitly enabled (which
# goes through `world-id-core/embed-zkeys` → `world-id-proof/embed-zkeys`
# directly, bypassing world-id-authenticator's defaults entirely).
#
# The source is a verbatim copy of world-id-authenticator v0.5.2 with only the
# `[features] default` line changed.  Update the vendor copy whenever
# world-id-authenticator is bumped.
[patch.crates-io]
world-id-authenticator = { path = "vendor/world-id-authenticator" }
# world-id-proof v0.5.2 ships with `default = ["embed-zkeys"]`, so any
# dependency that activates it with default-features (including world-id-core
# itself) triggers a build-script network download of circuit files.  This
# patch sets `default = []` so the download only happens when embed-zkeys is
# explicitly requested via our own `embed-zkeys` feature flag.
world-id-proof = { path = "vendor/world-id-proof" }
