[workspace]
members = ["uniffi-bindgen", "walletkit-core", "walletkit", "walletkit-db"]
resolver = "2"

[workspace.package]
version = "0.6.5"
license = "MIT"
edition = "2021"
authors = ["World Contributors"]
readme = "./README.md"
homepage = "https://docs.world.org"                             # TODO: Update to specific WalletKit page
rust-version = "1.91"                                           # MSRV
repository = "https://github.com/worldcoin/walletkit"
exclude = ["tests/", "uniffi-bindgen/"]
keywords = ["ZKP", "WorldID", "World", "Identity", "Semaphore"]
categories = ["api-bindings", "cryptography::cryptocurrencies"]


[workspace.dependencies]
alloy-core = { version = "1", default-features = false, features = [
  "sol-types",
] }
alloy-primitives = { version = "1", default-features = false }
walletkit-core = { version = "0.6.5", path = "walletkit-core", default-features = false }
uniffi = { version = "0.31", features = ["build", "tokio"] }
world-id-core = { version = "0.4.4", default-features = false }

# Temporary patches for WASM compatibility (until upstream releases)
[patch.crates-io]
# WASM compat: https://github.com/worldcoin/world-id-protocol/pull/512
world-id-core = { git = "https://github.com/worldcoin/world-id-protocol.git", branch = "feat/wasm-compat" }
world-id-authenticator = { git = "https://github.com/worldcoin/world-id-protocol.git", branch = "feat/wasm-compat" }
world-id-primitives = { git = "https://github.com/worldcoin/world-id-protocol.git", branch = "feat/wasm-compat" }
world-id-proof = { git = "https://github.com/worldcoin/world-id-protocol.git", branch = "feat/wasm-compat" }
# WASM compat: https://github.com/TaceoLabs/oprf-service/pull/488
taceo-oprf = { git = "https://github.com/Dzejkop/oprf-service.git", branch = "feat/wasm-compat" }
taceo-oprf-client = { git = "https://github.com/Dzejkop/oprf-service.git", branch = "feat/wasm-compat" }
taceo-oprf-core = { git = "https://github.com/Dzejkop/oprf-service.git", branch = "feat/wasm-compat" }
taceo-oprf-types = { git = "https://github.com/Dzejkop/oprf-service.git", branch = "feat/wasm-compat" }
# WASM compat: https://github.com/worldcoin/semaphore-rs/pull/131
semaphore-rs = { git = "https://github.com/worldcoin/semaphore-rs.git", branch = "feat/wasm-compat" }
semaphore-rs-storage = { git = "https://github.com/worldcoin/semaphore-rs.git", branch = "feat/wasm-compat" }
semaphore-rs-trees = { git = "https://github.com/worldcoin/semaphore-rs.git", branch = "feat/wasm-compat" }

[profile.release]
opt-level = 'z' # Optimize for size.
lto = true      # Enable Link Time Optimization.
panic = "abort"
debug = false
