[workspace]
git_release_enable = true
git_release_type = "auto"
pr_labels = ["release"]
release = false
publish = false
changelog_update = true

[[package]]
name = "walletkit"
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
changelog_include = ["walletkit-core", "walletkit-db"]
release = true
publish = true

[[package]]
name = "walletkit-core"
git_tag_enable = false
git_release_enable = false
changelog_update = false
release = true
publish = true

[[package]]
name = "walletkit-db"
git_tag_enable = false
git_release_enable = false
changelog_update = false
release = true
publish = true

[[package]]
name = "uniffi-bindgen"
release = false
publish = false
